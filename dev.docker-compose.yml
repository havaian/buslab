version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: legal_clinic_mongodb
    restart: always
    ports:
      - "127.0.0.1:${MONGODB_EXPOSE:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - legal_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal_clinic_backend
    restart: always
    depends_on:
      - mongodb
    env_file:
      - ./.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/${MONGO_DATABASE:-legal_clinic}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - legal_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal_clinic_frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - legal_net

volumes:
  mongodb_data:

networks:
  legal_net:
    driver: bridge