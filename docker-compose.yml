version: '3.8'

services:
  # Backend API service
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: legal_clinic_bot
    restart: always
    environment:
      - MONGO_URI=${MONGO_URL}
    env_file:
      - ./.env
    volumes:
      # Mount logs directory to host machine for persistent log storage
      - ./bot/logs:/app/logs
      # Mount i18n directory to host machine for persistent i18n storage
      - ./bot/i18n:/app/i18n:z
    networks:
      - legal_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legal_clinic_backend
    restart: always
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:10161:10161"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - legal_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: legal_clinic_frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:10162:10162"
    networks:
      - legal_net

networks:
  legal_net:
    driver: bridge